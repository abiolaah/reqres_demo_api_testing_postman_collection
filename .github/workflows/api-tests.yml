name: ReqRes API Tests

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 6 1 * *"
    - cron: "0 7 1 * *"

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          npm install -g newman newman-reporter-htmlextra
          sudo apt-get update && sudo apt-get install -y jq

      # -----------------------------
      # CHECK LOCAL TIME (ALBERTA)
      # -----------------------------
      - name: Check Alberta local midnight
        id: timecheck
        run: |
          HOUR=$(TZ="America/Edmonton" date +%H)
          DAY=$(TZ="America/Edmonton" date +%d)

          if [[ "$HOUR" == "00" && "$DAY" == "01" ]]; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
          fi

      # -----------------------------
      # RUN TESTS (DYNAMIC ITERATIONS)
      # -----------------------------
      - name: Run API tests
        id: run_tests
        if: github.event_name != 'schedule' || steps.timecheck.outputs.run == 'true'
        run: |
          set +e
          mkdir -p artifacts/current-run

          ITERATIONS=1

          if [[ "${{ github.event_name }}" == "schedule" && "${{ steps.timecheck.outputs.run }}" == "true" ]]; then
            ITERATIONS=4
          fi

          echo "Running $ITERATIONS iteration(s)"

          TOTAL_PASS=0
          TOTAL_FAIL=0
          FINAL_EXIT=0

          for i in $(seq 1 $ITERATIONS)
          do
            echo "Iteration $i"

            newman run collections/collection.json \
              -e environments/environment.json \
              --env-var "api_key=${{ secrets.API_KEY }}" \
              --reporters json,htmlextra \
              --reporter-json-export artifacts/current-run/report_$i.json \
              --reporter-htmlextra-export artifacts/current-run/report_$i.html

            EXIT_CODE=$?

            PASS=$(jq '.run.stats.assertions.total - .run.stats.assertions.failed' artifacts/current-run/report_$i.json)
            FAIL=$(jq '.run.stats.assertions.failed' artifacts/current-run/report_$i.json)

            TOTAL_PASS=$((TOTAL_PASS + PASS))
            TOTAL_FAIL=$((TOTAL_FAIL + FAIL))

            if [ "$EXIT_CODE" != "0" ]; then
              FINAL_EXIT=1
            fi
          done

          # Save ONE combined HTML (last run for simplicity)
          cp artifacts/current-run/report_$ITERATIONS.html artifacts/current-run/report.html
          cp artifacts/current-run/report_$ITERATIONS.json artifacts/current-run/report.json

          echo "total_pass=$TOTAL_PASS" >> $GITHUB_OUTPUT
          echo "total_fail=$TOTAL_FAIL" >> $GITHUB_OUTPUT
          echo "newman_exit_code=$FINAL_EXIT" >> $GITHUB_OUTPUT

          exit 0

      # -----------------------------
      # CHECKOUT GH_PAGES
      # -----------------------------
      - name: Checkout gh_pages
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: gh_pages
          path: gh_pages

      # -----------------------------
      # BUILD DASHBOARD + HISTORY
      # -----------------------------
      - name: Build dashboard
        run: |
          set -euo pipefail
          mkdir -p pages/reports

          if [ -d gh_pages/reports ]; then
            cp -r gh_pages/reports pages/
          fi

          if [ -f gh_pages/history.json ]; then
            cp gh_pages/history.json pages/history.json
          else
            echo "[]" > pages/history.json
          fi

          RUN_ID="${{ github.run_id }}-${{ github.run_attempt }}"
          RUN_DIR="pages/reports/$RUN_ID"
          mkdir -p "$RUN_DIR"

          cp artifacts/current-run/report.html "$RUN_DIR/"
          cp artifacts/current-run/report.json "$RUN_DIR/"

          PASS=${{ steps.run_tests.outputs.total_pass }}
          FAIL=${{ steps.run_tests.outputs.total_fail }}

          STATUS="passed"
          if [ "${{ steps.run_tests.outputs.newman_exit_code }}" != "0" ]; then
            STATUS="failed"
          fi

          UPDATED=$(jq \
            --arg id "$RUN_ID" \
            --arg status "$STATUS" \
            --arg time "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            --arg report "reports/$RUN_ID/report.html" \
            --argjson pass "$PASS" \
            --argjson fail "$FAIL" \
            '. += [{
              id:$id,
              time:$time,
              status:$status,
              pass:$pass,
              fail:$fail,
              report:$report
            }]' pages/history.json)

          echo "$UPDATED" > pages/history.json

      # -----------------------------
      # GENERATE DASHBOARD HTML
      # -----------------------------
      - name: Generate dashboard
        run: |
          cat << 'EOF' > pages/index.html
          <!DOCTYPE html>
          <html>
          <head>
            <title>ReqRes API Test Dashboard</title>
            <link rel="icon" type="image/x-icon" href="https://res.cloudinary.com/dixwarqdb/image/upload/v1777122850/favicon_wkbysq.ico">
            <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
            <style> body { margin: 0; font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1e3c72, #2a5298); color: #fff; } .container { max-width: 1200px; margin: auto; padding: 20px; } h1 { text-align: center; margin-bottom: 20px; } .card { background: #ffffff; color: #333; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.2); } .chart-container { height: 350px; } table { width: 100%; border-collapse: collapse; } th { background: #2a5298; color: #fff; padding: 10px; } td { padding: 10px; border-bottom: 1px solid #eee; } tr:hover { background: #f5f7fa; } .badge { padding: 5px 10px; border-radius: 8px; font-weight: bold; text-transform: uppercase; font-size: 12px; } .pass { background: #d4edda; color: #155724; } .fail { background: #f8d7da; color: #721c24; } a { color: #2a5298; font-weight: bold; text-decoration: none; } a:hover { text-decoration: underline; } @media (max-width: 768px) { .chart-container { height: 250px; } } </style>
          </head>
          <body>
            <div class="container">
              <h1>🚀 ReqRes API Test Dashboard</h1> 
              <!-- Chart Card --> 
              <div class="card"> 
                <h2>📊 Test Trends</h2>
                 <div class="chart-container">
                  <canvas id="trend"></canvas>
                </div>
                </div>
                 <!-- Table Card -->
                <div class="card"> 
                  <h2>📜 Run History</h2> 
                    <table>
                     <thead>
                      <tr>
                       <th>ID</th> 
                       <th>Time</th> 
                       <th>Status</th> 
                       <th>Pass</th> 
                       <th>Fail</th> 
                       <th>Details</th>
                      </tr>
                    </thead> 
                    <tbody id="rows"></tbody> 
                  </table> 
                </div>
              </div>

            <script>
            function formatTime(isoString) {
              const date = new Date(isoString);

              return new Intl.DateTimeFormat('en-US', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                hour12: false
              }).format(date);
            }
              fetch('history.json')
              .then(r => r.json())
              .then(data => {

                const labels = data.map(d => d.time);
                const passData = data.map(d => d.pass);
                const failData = data.map(d => d.fail);

                const passRate = data.map(d => {
                  const total = d.pass + d.fail;
                  return total === 0 ? 0 : Number(((d.pass / total) * 100).toFixed(2));
                });

                const maxPassRate = Math.max(...passRate);
                const y1Max = Math.min(110, Math.ceil(maxPassRate / 10) * 10 + 10);

                new Chart(document.getElementById('trend'), {
                  data: {
                    labels,
                    datasets: [
                      { type:'bar', label:'Pass', data:passData, backgroundColor:'#28a745',yAxisID: 'y', categoryPercentage: 0.6, barPercentage: 0.8 },
                      { type:'bar', label:'Fail', data:failData, backgroundColor:'#dc3545',yAxisID: 'y', categoryPercentage: 0.6, barPercentage: 0.8 },
                      {
                        type:'line',
                        label:'Pass Rate %',
                        data:passRate,
                        borderColor:'#ffc107',
                        yAxisID:'y1',
                        tension:0.3,
                        borderWidth:3,
                        pointRadius:4,
                        fill:false
                      }
                    ]
                  },
                  options:{
                    responsive:true,
                    maintainAspectRatio: false, 
                    plugins: {
                      legend: {
                        position: 'top' 
                      } 
                    },
                    scales:{
                    x:{
                      stacked:false
                    },
                      y:{ 
                        stacked:false,
                        beginAtZero:true,
                        title: { display: true, text: 'Assertions' }
                      },
                      y1:{
                        position:'right',
                        min:0,
                        max:y1Max,
                        grid: { drawOnChartArea: true },
                        title: { display: true, text: 'Pass Rate (%)' }
                      }
                    }
                  }
                });

                const rows = document.getElementById('rows');
                data.slice().reverse().forEach(d => {
                  rows.innerHTML += `
                    <tr>
                      <td>${d.id}</td>
                      <td>${formatTime(d.time)}</td>
                      <td>$<span class="badge ${d.status === 'passed' ? 'pass' : 'fail'}"> ${d.status.toUpperCase()} </span></td>
                      <td>${d.pass}</td>
                      <td>${d.fail}</td>
                      <td><a href="${d.report}" target="_blank">View</a></td>
                    </tr>`;
                });
              });
            </script>
          </body>
          </html>
          EOF

      # -----------------------------
      # DEPLOY
      # -----------------------------
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: pages
          publish_branch: gh_pages

      # -----------------------------
      # FAIL IF TEST FAILED
      # -----------------------------
      - name: Fail if needed
        if: steps.run_tests.outputs.newman_exit_code != '0'
        run: exit 1
