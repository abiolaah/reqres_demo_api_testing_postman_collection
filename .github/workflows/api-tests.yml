name: ReqRes API Tests

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          npm install -g newman newman-reporter-htmlextra
          sudo apt-get update && sudo apt-get install -y jq
          npm install -g newman-reporter-allure
          npm install -g allure-commandline --save-dev

      # -----------------------------
      # RUN TESTS
      # -----------------------------
      - name: Run API tests
        id: run_tests
        run: |
          set +e
          mkdir -p artifacts/current-run

          newman run collections/collection.json \
            -e environments/environment.json \
            --env-var "api_key=${{ secrets.API_KEY }}" \
            --reporters cli,json,htmlextra,allure \
            --reporter-json-export artifacts/current-run/report.json \
            --reporter-htmlextra-export artifacts/current-run/report.html \
            --reporter-allure-export artifacts/current-run/allure-results

          EXIT_CODE=$?
          echo "newman_exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          exit 0

      # -----------------------------
      # GENERATE ALLURE REPORT
      # -----------------------------
      - name: Generate Allure Report
        run: |
          mkdir -p artifacts/current-run/allure-report
          allure generate artifacts/current-run/allure-results \
            -o artifacts/current-run/allure-report --clean

      # -----------------------------
      # CHECKOUT GH-PAGES
      # -----------------------------
      - name: Checkout gh-pages
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      # -----------------------------
      # BUILD DASHBOARD + HISTORY
      # -----------------------------
      - name: Build dashboard
        run: |
          set -euo pipefail
          mkdir -p pages/reports

          # ✅ Preserve previous reports
          if [ -d gh-pages/reports ]; then
            cp -r gh-pages/reports pages/
          fi

          if [ -f gh-pages/history.json ]; then
            cp gh-pages/history.json pages/history.json
          else
            echo "[]" > pages/history.json
          fi

          RUN_ID="${{ github.run_id }}-${{ github.run_attempt }}"
          RUN_DIR="pages/reports/$RUN_ID"
          mkdir -p "$RUN_DIR"

          cp artifacts/current-run/report.html "$RUN_DIR/"
          cp artifacts/current-run/report.json "$RUN_DIR/"
          cp -r artifacts/current-run/allure-report "$RUN_DIR/"

          PASS=$(jq '.run.stats.assertions.total - .run.stats.assertions.failed' artifacts/current-run/report.json)
          FAIL=$(jq '.run.stats.assertions.failed' artifacts/current-run/report.json)

          STATUS="passed"
          if [ "${{ steps.run_tests.outputs.newman_exit_code }}" != "0" ]; then
            STATUS="failed"
          fi

          UPDATED=$(jq \
            --arg id "$RUN_ID" \
            --arg status "$STATUS" \
            --arg time "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            --arg report "reports/$RUN_ID/report.html" \
            --arg allure "reports/$RUN_ID/allure-report/index.html" \
            --argjson pass "$PASS" \
            --argjson fail "$FAIL" \
            '. += [{
              id:$id,
              time:$time,
              status:$status,
              pass:$pass,
              fail:$fail,
              report:$report,
              allure:$allure
            }]' pages/history.json)

          echo "$UPDATED" > pages/history.json

      # -----------------------------
      # BUILD DASHBOARD HTML
      # -----------------------------
      - name: Generate dashboard
        run: |
          cat << 'EOF' > pages/index.html
          <!DOCTYPE html>
          <html>
          <head>
            <title>API Test Dashboard</title>
            <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
            <style>
              body{font-family:Arial;max-width:1100px;margin:auto}
              table{border-collapse:collapse;width:100%}
              th,td{border:1px solid #ddd;padding:6px}
              th{background:#f4f4f4}
              .pass{color:green;font-weight:bold}
              .fail{color:red;font-weight:bold}
            </style>
          </head>
          <body>
            <h1>API Test Dashboard</h1>

            <canvas id="trend"></canvas>

            <h2>Run History</h2>
            <table>
              <thead>
                <tr>
                  <th>ID</th><th>Time</th><th>Status</th>
                  <th>Pass</th><th>Fail</th><th>Links</th>
                </tr>
              </thead>
              <tbody id="rows"></tbody>
            </table>

            <script>
              fetch('history.json')
                .then(r=>r.json())
                .then(data=>{
                  const labels = data.map(d=>d.time);
                  const fails = data.map(d=>d.fail);

                  new Chart(document.getElementById('trend'),{
                    type:'line',
                    data:{
                      labels:labels,
                      datasets:[{label:'Failures',data:fails}]
                    }
                  });

                  const rows = document.getElementById('rows');
                  data.reverse().forEach(d=>{
                    rows.innerHTML += `
                      <tr>
                        <td>${d.id}</td>
                        <td>${d.time}</td>
                        <td class="${d.status==='passed'?'pass':'fail'}">${d.status}</td>
                        <td>${d.pass}</td>
                        <td>${d.fail}</td>
                        <td>
                          <a href="${d.report}">HTML</a> |
                          <a href="${d.allure}">Allure</a>
                        </td>
                      </tr>`;
                  });
                });
            </script>
          </body>
          </html>
          EOF

      # -----------------------------
      # DEPLOY TO PAGES
      # -----------------------------
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: pages

      # -----------------------------
      # FAIL WORKFLOW IF TEST FAILED
      # -----------------------------
      - name: Fail if needed
        if: steps.run_tests.outputs.newman_exit_code != '0'
        run: exit 1
