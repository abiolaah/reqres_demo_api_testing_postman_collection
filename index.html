<!DOCTYPE html>
<html>
<head>
  <title>API Test Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body{font-family:Arial;max-width:1100px;margin:auto}
    table{border-collapse:collapse;width:100%}
    th,td{border:1px solid #ddd;padding:6px}
    th{background:#f4f4f4}
    .pass{color:green;font-weight:bold}
    .fail{color:red;font-weight:bold}
  </style>
</head>
<body>
  <h1>API Test Dashboard</h1>

  <canvas id="trend"></canvas>

  <h2>Run History</h2>
  <table>
    <thead>
      <tr>
        <th>ID</th><th>Time</th><th>Status</th>
        <th>Pass</th><th>Fail</th><th>Links</th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>

  <script>
    fetch('history.json')
      .then(r=>r.json())
      .then(data=>{
        const labels = data.map(d=>d.time);
        const fails = data.map(d=>d.fail);

        new Chart(document.getElementById('trend'),{
          type:'line',
          data:{
            labels:labels,
            datasets:[{label:'Failures',data:fails}]
          }
        });

        const rows = document.getElementById('rows');
        data.reverse().forEach(d=>{
          rows.innerHTML += `
            <tr>
              <td>${d.id}</td>
              <td>${d.time}</td>
              <td class="${d.status==='passed'?'pass':'fail'}">${d.status}</td>
              <td>${d.pass}</td>
              <td>${d.fail}</td>
              <td>
                <a href="${d.report}">HTML</a> |
                <a href="${d.allure}">Allure</a>
              </td>
            </tr>`;
        });
      });
  </script>
</body>
</html>
