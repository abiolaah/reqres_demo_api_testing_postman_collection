<!DOCTYPE html>
<html>
<head>
  <title>ReqRes API Test Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { margin:0; font-family:sans-serif; background:#1e3c72; color:#fff; }
    .container { max-width:1200px; margin:auto; padding:20px; }
    .card { background:#fff; color:#333; padding:20px; border-radius:10px; margin-bottom:20px; }
    .chart-container { height:350px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>ReqRes API Test Dashboard</h1>

    <div class="card">
      <canvas id="trend"></canvas>
    </div>

    <div class="card">
      <table border="1" width="100%">
        <thead>
          <tr>
            <th>ID</th><th>Time</th><th>Status</th>
            <th>Pass</th><th>Fail</th><th>Report</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </div>

  <script>
    fetch('history.json')
    .then(r => r.json())
    .then(data => {

      const labels = data.map(d => d.time);
      const passData = data.map(d => d.pass);
      const failData = data.map(d => d.fail);

      const passRate = data.map(d => {
        const total = d.pass + d.fail;
        return total === 0 ? 0 : Number(((d.pass / total) * 100).toFixed(2));
      });

      new Chart(document.getElementById('trend'), {
        data: {
          labels,
          datasets: [
            { type:'bar', label:'Pass', data:passData, backgroundColor:'#28a745' },
            { type:'bar', label:'Fail', data:failData, backgroundColor:'#dc3545' },
            {
              type:'line',
              label:'Pass %',
              data:passRate,
              borderColor:'#ffc107',
              yAxisID:'y1',
              tension:0.3,
              borderWidth:3,
              pointRadius:4,
              fill:false
            }
          ]
        },
        options:{
          responsive:true,
          scales:{
            y:{ beginAtZero:true },
            y1:{
              position:'right',
              min:0,
              max:100,
              grid:{ drawOnChartArea:false }
            }
          }
        }
      });

      const rows = document.getElementById('rows');
      data.slice().reverse().forEach(d => {
        rows.innerHTML += `
          <tr>
            <td>${d.id}</td>
            <td>${d.time}</td>
            <td>${d.status}</td>
            <td>${d.pass}</td>
            <td>${d.fail}</td>
            <td><a href="${d.report}" target="_blank">View</a></td>
          </tr>`;
      });
    });
  </script>
</body>
</html>
