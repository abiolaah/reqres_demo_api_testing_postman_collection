<!DOCTYPE html>
<html>
<head>
  <title>ReqRes API Test Dashboard</title>
  <link rel="icon" type="image/x-icon" href="https://res.cloudinary.com/dixwarqdb/image/upload/v1777122850/favicon_wkbysq.ico">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: #fff;
    }

    .container {
      max-width: 1200px;
      margin: auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .card {
      background: #ffffff;
      color: #333;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    .chart-container {
      height: 350px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      background: #2a5298;
      color: #fff;
      padding: 10px;
    }

    td {
      padding: 10px;
      border-bottom: 1px solid #eee;
    }

    tr:hover {
      background: #f5f7fa;
    }

    .badge {
      padding: 5px 10px;
      border-radius: 8px;
      font-weight: bold;
      text-transform: uppercase;
      font-size: 12px;
    }

    .pass {
      background: #d4edda;
      color: #155724;
    }

    .fail {
      background: #f8d7da;
      color: #721c24;
    }

    a {
      color: #2a5298;
      font-weight: bold;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    @media (max-width: 768px) {
      .chart-container {
        height: 250px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🚀 ReqRes API Test Dashboard</h1>

    <!-- Chart Card -->
    <div class="card">
      <h2>📊 Test Trends</h2>
      <div class="chart-container">
        <canvas id="trend"></canvas>
      </div>
    </div>

    <!-- Table Card -->
    <div class="card">
      <h2>📜 Run History</h2>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Time</th>
            <th>Status</th>
            <th>Pass</th>
            <th>Fail</th>
            <th>Details</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </div>

  <script>
    fetch('history.json')
      .then(r => r.json())
      .then(data => {

        const labels = data.map(d => d.time);
        const passData = data.map(d => d.pass);
        const failData = data.map(d => d.fail);

        const passRate = data.map(d => {
          const total = d.pass + d.fail;
          return total === 0 ? 0 : ((d.pass / total) * 100).toFixed(2);
        });

        new Chart(document.getElementById('trend'), {
          data: {
            labels: labels,
            datasets: [
              {
                type: 'bar',
                label: 'Passed',
                data: passData,
                backgroundColor: '#28a745',
                stack: 'tests',
                yAxisID: 'y'
              },
              {
                type: 'bar',
                label: 'Failed',
                data: failData,
                backgroundColor: '#dc3545',
                stack: 'tests',
                yAxisID: 'y'
              },
              {
                type: 'line',
                label: 'Pass Rate (%)',
                data: passRate,
                borderColor: '#ffc107',
                backgroundColor: '#ffc107',
                yAxisID: 'y1',
                tension: 0.3
              }
            ]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: {
                position: 'top'
              }
            },
            scales: {
              x: {
                stacked: true
              },
              y: {
                stacked: true,
                beginAtZero: true,
                title: {
                  display: true,
                  text: 'Assertions'
                }
              },
              y1: {
                position: 'right',
                min: 0,
                max: 100,
                grid: {
                  drawOnChartArea: false
                },
                title: {
                  display: true,
                  text: 'Pass Rate (%)'
                }
              }
            }
          }
        });

        const rows = document.getElementById('rows');

        data.reverse().forEach(d => {
          rows.innerHTML += `
            <tr>
              <td>${d.id}</td>
              <td>${d.time}</td>
              <td>
                <span class="badge ${d.status === 'passed' ? 'pass' : 'fail'}">
                  ${d.status}
                </span>
              </td>
              <td>${d.pass}</td>
              <td>${d.fail}</td>
              <td><a href="${d.report}" target="_blank">View Report</a></td>
            </tr>`;
        });

      });
  </script>
</body>
</html>
